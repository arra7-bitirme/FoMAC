# ReID Default Configuration
# Person Re-Identification for Football Players

# Model Configuration
model:
  backbone: resnet50  # ResNet50 pretrained on ImageNet
  emb_dim: 256        # Embedding dimension (L2-normalized)
  pretrained: true    # Use ImageNet pretrained weights
  last_stride: 1      # Stride in last conv layer (1 for better spatial resolution)

# Loss Configuration
loss:
  ce_weight: 1.0          # Cross-entropy loss weight
  triplet_weight: 1.0     # Triplet loss weight
  triplet_margin: 0.3     # Margin for triplet loss
  label_smooth: 0.1       # Label smoothing epsilon

# Training Configuration
train:
  epochs: 80
  batch_size: 64      # Total batch size (P×K sampling)
  num_instances: 4    # K: instances per identity (P×K = batch_size)
  lr: 0.0003          # Learning rate (3e-4)
  optimizer: adamw
  weight_decay: 0.0005
  scheduler: warmup_cosine
  warmup_epochs: 10
  warmup_factor: 0.01
  
  # Gradient settings
  grad_clip: 5.0      # Gradient clipping value
  
  # Checkpoint settings
  save_period: 10     # Save checkpoint every N epochs
  eval_period: 5      # Evaluate every N epochs

# Data Augmentation
augmentation:
  random_flip: 0.5          # Horizontal flip probability (careful with jersey numbers)
  random_crop: true
  random_erasing: 0.5       # Random erasing probability
  color_jitter:
    brightness: 0.2
    contrast: 0.2
    saturation: 0.2
    hue: 0.1
  padding: 10                # Padding for random crop
  
# Data Configuration  
data:
  root: data/reid           # Root directory for reid dataset
  height: 256               # Input image height
  width: 128                # Input image width
  mean: [0.485, 0.456, 0.406]  # ImageNet normalization
  std: [0.229, 0.224, 0.225]
  
  # Dataset structure: train/<pid>/*.jpg, query/<pid>/*.jpg, gallery/<pid>/*.jpg
  train_dir: train
  query_dir: query
  gallery_dir: gallery

# Evaluation Configuration
eval:
  batch_size: 128
  metrics: [mAP, Rank1, Rank5, Rank10]
  rerank: false             # Enable re-ranking (k-reciprocal encoding)
  max_rank: 50              # Maximum rank to compute

# Export Configuration
export:
  path: outputs/reid/checkpoints/best_reid.pt
  format: pytorch           # Export format
  
# Device Configuration
device:
  use_cuda: true
  gpu_ids: [0]
  num_workers: 4
  pin_memory: true

# Logging Configuration
logging:
  log_dir: outputs/reid/logs
  tensorboard: true
  print_freq: 20            # Print frequency (iterations)
  
# Paths
paths:
  workspace_root: /home/airborne/Desktop/eray/FoMAC/model-training/reid
  data_root: /home/airborne/Desktop/eray/FoMAC/data/reid
  output_root: /home/airborne/Desktop/eray/FoMAC/outputs/reid
  yolo_weights: /home/airborne/Desktop/eray/FoMAC/model-training/ball-detection/models/player_ball_detector/weights/best.pt
