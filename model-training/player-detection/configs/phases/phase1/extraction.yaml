# Phase 1 Extraction Configuration

# Dataset selection
dataset_type: "snmot"

# Extraction control
run_extraction: false
clean_output: false

# SNMOT-specific settings
snmot:
  copy_images: true
  include_empty_frames: true
  min_confidence: 0.25
  clamp_boxes: true
  balance_frames:
    enabled: true
    majority_classes:
      - player_team_left
      - player_team_right
    minority_classes:
      - ball
      - referee_main
      - referee_side_top
      - referee_side_bottom
      - goalkeeper_team_left
      - goalkeeper_team_right
    majority_keep_prob: 0.35
    empty_keep_prob: 0.3
    duplicate_minority: 1
    instance_caps:
      enabled: false
      target_splits: ["train"]
      shuffle_sequences: true
      shuffle_frames: true
      classes: {}

  label_transform:
    enabled: true
    groups:
      player_team_left:
        - player_team_left
      player_team_right:
        - player_team_right
    default_group: other
    drop_unmatched: false
    include: []
    exclude: []
    rename: {}

# Sampling settings
max_samples_per_half: null
min_box_size: 4

# Class configuration
class_names:
  - player_team_left
  - player_team_right
  - other

# Season splits (legacy)
season_splits:
  train: ["2014-2015"]
  val: ["2015-2016"]
  test: ["2016-2017"]

scale_mode: "scale"
validate_boxes: true
