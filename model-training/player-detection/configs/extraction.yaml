# Dataset Extraction Configuration

# Dataset selection
dataset_type: "snmot"   # Options: snmot, soccernet

# Extraction control
run_extraction: false     # Ensure new balancing pass is executed
clean_output: false       # Remove previously extracted dataset before running

# SNMOT-specific settings
snmot:
  copy_images: true            # Copy frames into YOLO layout (set false to hardlink when supported)
  include_empty_frames: true   # Keep negatives for better precision
  min_confidence: 0.25         # Drop noisy boxes from very low-confidence tracklets
  clamp_boxes: true            # Clamp bounding boxes to image bounds
  balance_frames:
    enabled: true
    majority_classes:          # Frames containing only these classes can be subsampled
      - player_team_left
      - player_team_right
    minority_classes:          # Always keep + optionally duplicate frames containing these
      - ball
      - referee_main
      - referee_side_top
      - referee_side_bottom
      - goalkeeper_team_left
      - goalkeeper_team_right
    majority_keep_prob: 0.35   # Keep about 35% of player-only frames
    empty_keep_prob: 0.3       # Retain a third of empty frames for negatives
    duplicate_minority: 1      # Duplicate frames that include minority classes once

    instance_caps:
      enabled: false          # disable per-class caps to keep full player distribution
      target_splits: ["train"]
      shuffle_sequences: true
      shuffle_frames: true
      classes: {}

  label_transform:
    enabled: false
    groups: {}
    default_group: null
    drop_unmatched: false
    include: []
    exclude: []
    rename: {}

# Sampling settings (legacy options kept for compatibility)
max_samples_per_half: null     # SoccerNet only
min_box_size: 4                # Minimum bounding box size in pixels

# Temporal alignment settings (SoccerNet only)
det_fps: null
det_start_sec: 0.5
frame_shift: 0

# Class configuration
# Leave empty to auto-detect classes from SNMOT metadata.
class_names: []

# Season splits for train/val/test (SoccerNet only)
season_splits:
  train: ["2014-2015"]
  val: ["2015-2016"]
  test: ["2016-2017"]

# Video quality settings (SoccerNet only)
jpeg_quality: 95

# Bbox scaling and validation
scale_mode: "scale"
validate_boxes: true