detection:
  weights: C:\Users\Admin\Desktop\dualPhase\FoMAC\model-training\ball-detection\models\player_ball_detector\weights\best.pt
  conf: 0.28
  iou: 0.5
  imgsz: 1280
  classes:
    players:
      - 0
    goalkeepers:
      - 0
    referees:
      - 3
    ball:
      - 1

tracking:
  device: auto
  save_visualizations: false
  half: false
  vid_stride: 1
  progress: true
  players:
    max_age: 32
    iou_threshold: 0.3
    min_hits: 3
  referees:
    max_age: 32
    iou_threshold: 0.3
    min_hits: 3
  ball:
    max_age: 12
    process_noise: 1.0
    measurement_noise: 0.2
  association:
    max_distance: 0.7
    iou_weight: 0.6
    appearance_weight: 0.4
  reid:
    enabled: false
    weights: outputs/reid/checkpoints/best_reid.pt
    device: auto
    alpha: 0.6
    beta: 0.4
    max_distance: 0.7
    image_size: [256, 128]
    target_classes: players
  appearance_embedding:
    enabled: true
    color_space: lab
    bins: 24
    alpha: 0.65
    beta: 0.35
    max_distance: 0.5
    target_classes: players

datasets:
  enabled: false
  root: C:\datasets\tracking
  splits:
    - train
    - test
  sequences: null
  output_dir: outputs/tracks
  limit_frames: null

videos:
  # Uncomment and point to MP4/AVI/etc. files to run tracking directly from this config.
  # sources:
  #   - C:\videos\match01.mp4
  # names:
  #   - match01
  sources:
    - H:\SoccerNetVideos\england_epl\2014-2015\2015-02-21 - 18-00 Chelsea 1 - 1 Burnley\1_720p.mkv
  names:
    - chelsea_burnley_2015

output:
  write_csv: true
  write_video: true
  csv_name_template: "{sequence}.csv"
  csv_precision: 4

team_classification:
  enabled: true
  method: color
  samples_per_track: 12
  min_track_hits: 6
  color_space: lab
  blur_kernel: 5
  clusters: 2
  focus_ratio: 0.6
