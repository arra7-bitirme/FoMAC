reid_dataset:
  root: c:/datasets/reid
  train_split: train
  val_split: train
  image_size: [256, 128]
  batch_size: 48
  num_workers: 8
  epochs: 12
  learning_rate: 0.0001
  weight_decay: 0.0005
  classifier_dropout: 0.3
  label_smoothing: 0.1
  max_train_samples: null
  max_val_samples: null
  device: cuda:0
  output_dir: outputs/reid

feature_extractor:
  weights: C:/Users/Admin/Desktop/dualPhase/FoMAC/model-training/ball-detection/models/player_ball_detector/weights/best.pt
  head_feature_index: -1   # -1 -> last feature map feeding detection head
  module_index: null       # optional absolute layer index override
  freeze: true

embedding_head:
  embedding_dim: 512
  hidden_dim: 1024
  normalize: true
