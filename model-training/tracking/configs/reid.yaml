reid_dataset:
  root: ../../datasets/soccernetv3/reid
  train_split: train
  val_split: valid
  image_size: [256, 128]
  batch_size: 48
  num_workers: 8
  epochs: 12
  learning_rate: 0.0001
  weight_decay: 0.0005
  classifier_dropout: 0.3
  label_smoothing: 0.1
  max_train_samples: null
  max_val_samples: null
  device: auto
  output_dir: outputs/reid
